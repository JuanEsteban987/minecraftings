<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego visual · Escenario de ejecución</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #2d3e4f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app-container {
            background: #1e2a36;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            width: 1100px;
            max-width: 100%;
        }
        .toolbar {
            background: #2c3e50;
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px #1a242f, 0 4px 8px #0f1a22;
        }
        .toolbar button {
            background: #4a6fa5;
            border: none;
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #2c3e50, 0 6px 12px black;
            transition: 0.07s ease;
            border-bottom: 2px solid #1b2b3a;
            letter-spacing: 0.5px;
        }
        .toolbar button:hover {
            background: #5f7fb0;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2c3e50, 0 10px 18px black;
        }
        .toolbar button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #2c3e50, 0 6px 12px black;
        }
        .workspace-wrapper {
            position: relative;
            background: #3a4e62;
            border-radius: 28px;
            padding: 15px;
            box-shadow: inset 0 0 0 2px #1d2a35, 0 10px 20px rgba(0,0,0,0.6);
        }
        #workspace {
            position: relative;
            width: 100%;
            height: 540px;
            background: #e2eaf1;
            background-image: 
                linear-gradient(rgba(120, 140, 160, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 140, 160, 0.2) 1px, transparent 1px);
            background-size: 25px 25px;
            border-radius: 20px;
            overflow: hidden;
            cursor: default;
            box-shadow: inset 0 0 30px #1b2b38;
        }
        #connections-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #nodes-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 20;
        }
        .node {
            position: absolute;
            width: 160px;
            min-height: 90px;
            background: #f4f9ff;
            border-radius: 16px;
            border: 3px solid #1f3a4b;
            box-shadow: 0 8px 0 #0f2838, 0 12px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.1s;
            cursor: default;
            color: #0a1e2b;
        }
        .node:active {
            box-shadow: 0 4px 0 #0f2838, 0 8px 15px rgba(0,0,0,0.3);
        }
        .node-header {
            background: #2b4b65;
            padding: 8px 12px;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
            color: white;
            text-align: center;
            cursor: grab;
            border-bottom: 2px solid #0e2a3a;
            letter-spacing: 0.8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .node-header:active {
            cursor: grabbing;
        }
        .node-content {
            padding: 12px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #eaf0f8;
            border-radius: 0 0 16px 16px;
        }
        .node select {
            background: #1f3e52;
            color: white;
            border: 2px solid #0e2a38;
            border-radius: 30px;
            padding: 5px 8px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }
        .node .tipo-badge {
            background: #173342;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            text-align: center;
        }
        .port {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #d64550;
            border: 3px solid #631e26;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            cursor: crosshair;
            box-shadow: 0 2px 6px black;
            transition: 0.1s;
        }
        .port.left {
            left: -12px;
            background: #4db8b8;
            border-color: #1d6b6b;
        }
        .port.right {
            right: -12px;
            background: #f0a55a;
            border-color: #a5521a;
        }
        .port:hover {
            transform: translateY(-50%) scale(1.2);
            filter: brightness(1.2);
        }
        .log-panel {
            background: #17212b;
            margin-top: 20px;
            border-radius: 30px;
            padding: 12px 22px;
            color: #c9e9ff;
            font-family: monospace;
            font-size: 1rem;
            border: 2px solid #0d1a24;
            box-shadow: inset 0 0 10px #0b141c;
            max-height: 120px;
            overflow-y: auto;
        }
        .log-panel div {
            padding: 4px 0;
            border-bottom: 1px dashed #3a5568;
        }
        .log-panel .log-title {
            font-weight: bold;
            color: #ffd966;
            border: none;
            font-size: 1.1rem;
        }
        .footer-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        /* --- MODAL DEL ESCENARIO --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #1f3a4b;
            border-radius: 40px;
            padding: 25px 30px;
            box-shadow: 0 20px 30px black;
            border: 4px solid #4a6fa5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .modal-content h2 {
            color: white;
            margin: 0;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0 #0a1e2b;
        }
        #escenario-canvas {
            background: #b3cfe3;
            border-radius: 30px;
            box-shadow: inset 0 0 0 4px #2b4b65, 0 10px 20px black;
            width: 450px;
            height: 450px;
            display: block;
        }
        .modal-botones {
            display: flex;
            gap: 30px;
        }
        .modal-botones button {
            background: #e24b4b;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 10px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #6b1f1f, 0 8px 16px black;
            transition: 0.07s;
            border-bottom: 3px solid #4d1717;
        }
        .modal-botones button:hover {
            background: #f25f5f;
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #6b1f1f, 0 12px 22px black;
        }
        .modal-botones button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #6b1f1f;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <button id="btnAddInicio">➕ Inicio</button>
        <button id="btnAddMover">🔄 Mover</button>
        <button id="btnAddFin">🏁 Fin</button>
        <button id="btnEjecutar">▶️ Ejecutar</button>
        <button id="btnReiniciar">♻️ Reiniciar</button>
    </div>

    <div class="workspace-wrapper">
        <div id="workspace">
            <canvas id="connections-canvas" width="1000" height="600"></canvas>
            <div id="nodes-container"></div>
        </div>
    </div>

    <div class="log-panel" id="logPanel">
        <div class="log-title">📋 Consola de ejecución</div>
        <div id="logContent">-- Listo para programar --</div>
    </div>
</div>

<!-- MODAL ESCENARIO (oculto inicialmente) -->
<div id="modalEscenario" class="modal-overlay hidden">
    <div class="modal-content">
        <h2>🎮 ESCENARIO</h2>
        <canvas id="escenario-canvas" width="450" height="450"></canvas>
        <div class="modal-botones">
            <button id="btnCerrarEscenario">🚪 SALIR</button>
        </div>
    </div>
</div>

<script>
(function() {
    // --- Estado de la aplicación ---
    let nodes = [];               // { id, type, x, y, direction? }
    let connections = [];         // { fromId, toId }  (único origen y destino)
    let nextId = 1;

    // Referencias DOM
    const workspace = document.getElementById('workspace');
    const nodesContainer = document.getElementById('nodes-container');
    const canvas = document.getElementById('connections-canvas');
    const ctx = canvas.getContext('2d');
    const logContent = document.getElementById('logContent');

    // Variables para arrastrar nodos
    let draggingNode = null;
    let dragOffsetX = 0, dragOffsetY = 0;

    // Variables para conexión temporal
    let draggingConnection = false;
    let fromNodeId = null;
    let tempEndPos = { x: 0, y: 0 };

    // --- Referencias al modal y escenario ---
    const modal = document.getElementById('modalEscenario');
    const escenarioCanvas = document.getElementById('escenario-canvas');
    const escenarioCtx = escenarioCanvas.getContext('2d');
    const btnCerrar = document.getElementById('btnCerrarEscenario');

    // Variables para la animación del escenario
    let animacionActiva = false;
    let frameId = null;
    let secuenciaMovimientos = [];      // array de direcciones (strings)
    let pasoActual = 0;
    let posX = 2, posY = 2;             // inicio en centro de grid 5x5 (0-4)
    const TAM_CELDA = 90;                // 450/5 = 90

    // --- Funciones de utilidad ---
    function resizeCanvas() {
        const rect = workspace.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        drawConnections();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- Funciones de dibujo de conexiones (igual que antes) ---
    function drawConnections() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!nodes.length) return;

        connections.forEach(conn => {
            const fromPos = getPortPos(conn.fromId, 'output');
            const toPos = getPortPos(conn.toId, 'input');
            if (fromPos && toPos) {
                drawLine(fromPos, toPos, '#1f6390', 4);
            }
        });

        if (draggingConnection && fromNodeId) {
            const startPos = getPortPos(fromNodeId, 'output');
            if (startPos) {
                drawLine(startPos, tempEndPos, '#f0a55a', 3, true);
            }
        }
    }

    function drawLine(from, to, color, width, dashed = false) {
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.setLineDash(dashed ? [8, 6] : []);
        ctx.stroke();
        if (!dashed) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            const arrowSize = 10;
            ctx.beginPath();
            ctx.moveTo(to.x, to.y);
            ctx.lineTo(to.x - arrowSize * Math.cos(angle - 0.3), to.y - arrowSize * Math.sin(angle - 0.3));
            ctx.lineTo(to.x - arrowSize * Math.cos(angle + 0.3), to.y - arrowSize * Math.sin(angle + 0.3));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }
        ctx.setLineDash([]);
    }

    function getPortPos(nodeId, portType) {
        const nodeDiv = document.querySelector(`.node[data-id="${nodeId}"]`);
        if (!nodeDiv) return null;
        const port = nodeDiv.querySelector(`.port.${portType === 'input' ? 'left' : 'right'}`);
        if (!port) return null;

        const canvasRect = canvas.getBoundingClientRect();
        const portRect = port.getBoundingClientRect();
        return {
            x: portRect.left + portRect.width/2 - canvasRect.left,
            y: portRect.top + portRect.height/2 - canvasRect.top
        };
    }

    // --- Gestión de conexiones ---
    function removeOutgoingFrom(nodeId) {
        connections = connections.filter(c => c.fromId !== nodeId);
    }
    function removeIncomingTo(nodeId) {
        connections = connections.filter(c => c.toId !== nodeId);
    }

    function addConnection(fromId, toId) {
        if (fromId === toId) return false;

        const fromNode = nodes.find(n => n.id == fromId);
        const toNode = nodes.find(n => n.id == toId);
        if (!fromNode || !toNode) return false;
        if (fromNode.type === 'fin' || toNode.type === 'inicio') return false;

        removeOutgoingFrom(fromId);
        removeIncomingTo(toId);

        connections.push({ fromId, toId });
        drawConnections();
        return true;
    }

    // --- Arrastre de nodos ---
    function startDragNode(nodeId, clientX, clientY) {
        const node = nodes.find(n => n.id == nodeId);
        if (!node) return;
        const nodeDiv = document.querySelector(`.node[data-id="${nodeId}"]`);
        if (!nodeDiv) return;
        const rect = nodeDiv.getBoundingClientRect();
        const workspaceRect = workspace.getBoundingClientRect();

        draggingNode = nodeId;
        dragOffsetX = clientX - rect.left;
        dragOffsetY = clientY - rect.top;
    }

    function onDragNode(clientX, clientY) {
        if (!draggingNode) return;
        const workspaceRect = workspace.getBoundingClientRect();
        let newX = clientX - workspaceRect.left - dragOffsetX;
        let newY = clientY - workspaceRect.top - dragOffsetY;

        newX = Math.max(0, Math.min(workspaceRect.width - 160, newX));
        newY = Math.max(0, Math.min(workspaceRect.height - 100, newY));

        const node = nodes.find(n => n.id == draggingNode);
        if (node) {
            node.x = newX;
            node.y = newY;
        }
        syncNodePositions();
    }

    function stopDragNode() {
        draggingNode = null;
    }

    function renderNodes() {
        nodesContainer.innerHTML = '';
        nodes.forEach(node => {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.setAttribute('data-id', node.id);
            nodeDiv.style.left = node.x + 'px';
            nodeDiv.style.top = node.y + 'px';

            const header = document.createElement('div');
            header.className = 'node-header';
            header.textContent = node.type === 'inicio' ? '🚀 INICIO' : (node.type === 'fin' ? '🏁 FIN' : '⚙️ MOVER');
            const badge = document.createElement('span');
            badge.className = 'tipo-badge';
            badge.textContent = node.type === 'inicio' ? 'INICIO' : (node.type === 'fin' ? 'FIN' : 'MOVER');
            header.appendChild(badge);
            nodeDiv.appendChild(header);

            const content = document.createElement('div');
            content.className = 'node-content';
            if (node.type === 'move') {
                const select = document.createElement('select');
                select.setAttribute('data-id', node.id);
                select.setAttribute('data-type', 'direction');
                const direcciones = ['arriba', 'abajo', 'izquierda', 'derecha'];
                direcciones.forEach(dir => {
                    const option = document.createElement('option');
                    option.value = dir;
                    option.textContent = dir.charAt(0).toUpperCase() + dir.slice(1);
                    if (node.direction === dir) option.selected = true;
                    select.appendChild(option);
                });
                select.addEventListener('change', (e) => {
                    const newDir = e.target.value;
                    const targetNode = nodes.find(n => n.id == e.target.getAttribute('data-id'));
                    if (targetNode) targetNode.direction = newDir;
                });
                content.appendChild(select);
            } else {
                const hint = document.createElement('div');
                hint.style.textAlign = 'center';
                hint.style.padding = '8px';
                hint.style.background = '#cbdbe9';
                hint.style.borderRadius = '30px';
                hint.style.fontWeight = '500';
                hint.textContent = node.type === 'inicio' ? 'Punto de entrada' : 'Punto final';
                content.appendChild(hint);
            }
            nodeDiv.appendChild(content);

            if (node.type !== 'inicio') {
                const leftPort = document.createElement('div');
                leftPort.className = 'port left';
                leftPort.setAttribute('data-node-id', node.id);
                leftPort.setAttribute('data-port-type', 'input');
                nodeDiv.appendChild(leftPort);
            }
            if (node.type !== 'fin') {
                const rightPort = document.createElement('div');
                rightPort.className = 'port right';
                rightPort.setAttribute('data-node-id', node.id);
                rightPort.setAttribute('data-port-type', 'output');
                nodeDiv.appendChild(rightPort);
            }

            nodesContainer.appendChild(nodeDiv);
        });
        drawConnections();
    }

    function syncNodePositions() {
        nodes.forEach(node => {
            const nodeDiv = document.querySelector(`.node[data-id="${node.id}"]`);
            if (nodeDiv) {
                nodeDiv.style.left = node.x + 'px';
                nodeDiv.style.top = node.y + 'px';
            }
        });
        drawConnections();
    }

    // --- Eventos de ratón ---
    function handleMouseDown(e) {
        const target = e.target;

        if (target.classList.contains('port') && target.classList.contains('right')) {
            e.preventDefault();
            e.stopPropagation();
            const nodeId = target.getAttribute('data-node-id');
            if (!nodeId) return;
            fromNodeId = nodeId;
            draggingConnection = true;
            const canvasRect = canvas.getBoundingClientRect();
            tempEndPos.x = e.clientX - canvasRect.left;
            tempEndPos.y = e.clientY - canvasRect.top;
            drawConnections();
            return;
        }

        if (target.classList.contains('node-header') || (target.parentElement && target.parentElement.classList.contains('node-header'))) {
            e.preventDefault();
            const nodeDiv = target.closest('.node');
            if (!nodeDiv) return;
            const nodeId = nodeDiv.getAttribute('data-id');
            if (!nodeId) return;
            startDragNode(nodeId, e.clientX, e.clientY);
        }
    }

    function handleMouseMove(e) {
        if (draggingConnection) {
            const canvasRect = canvas.getBoundingClientRect();
            tempEndPos.x = e.clientX - canvasRect.left;
            tempEndPos.y = e.clientY - canvasRect.top;
            drawConnections();
        }
        if (draggingNode) {
            onDragNode(e.clientX, e.clientY);
        }
    }

    function handleMouseUp(e) {
        if (draggingConnection) {
            const target = e.target;
            if (target.classList.contains('port') && target.classList.contains('left')) {
                const toNodeId = target.getAttribute('data-node-id');
                if (toNodeId && fromNodeId) {
                    addConnection(fromNodeId, toNodeId);
                }
            }
            draggingConnection = false;
            fromNodeId = null;
            drawConnections();
        }
        if (draggingNode) {
            stopDragNode();
        }
    }

    // --- Añadir nodos ---
    function addNode(type) {
        const baseX = 50 + (nodes.length * 30) % 300;
        const baseY = 50 + (nodes.length * 20) % 300;
        const newNode = {
            id: nextId++,
            type: type,
            x: baseX,
            y: baseY,
        };
        if (type === 'move') {
            newNode.direction = 'derecha';
        }
        nodes.push(newNode);
        renderNodes();
    }

    // --- Función para obtener la secuencia de direcciones desde el grafo ---
    function obtenerSecuenciaMovimientos() {
        const inicio = nodes.find(n => n.type === 'inicio');
        if (!inicio) return { exito: false, mensaje: 'No hay nodo Inicio', movimientos: [] };

        let visitados = new Set();
        let current = inicio;
        let movimientos = [];
        let steps = 0;
        const maxSteps = 50;

        while (current && steps < maxSteps) {
            if (visitados.has(current.id)) {
                return { exito: false, mensaje: 'Ciclo detectado', movimientos };
            }
            visitados.add(current.id);

            if (current.type === 'move') {
                movimientos.push(current.direction || 'derecha');
            } else if (current.type === 'fin') {
                return { exito: true, mensaje: 'OK', movimientos };
            }

            const outConn = connections.find(c => c.fromId === current.id);
            if (!outConn) {
                // Si no es fin y no hay salida, terminamos (puede que no haya fin)
                return { exito: current.type === 'fin', mensaje: current.type === 'fin' ? 'OK' : 'Flujo truncado', movimientos };
            }
            const next = nodes.find(n => n.id == outConn.toId);
            if (!next) {
                return { exito: false, mensaje: 'Conexión rota', movimientos };
            }
            current = next;
            steps++;
        }
        return { exito: false, mensaje: 'Demasiados pasos', movimientos };
    }

    // --- DIBUJAR ESCENARIO (grid y personaje) ---
    function dibujarEscenario() {
        escenarioCtx.clearRect(0, 0, 450, 450);

        // Dibujar grid 5x5
        escenarioCtx.strokeStyle = '#2b4b65';
        escenarioCtx.lineWidth = 3;
        for (let i = 0; i <= 5; i++) {
            const p = i * TAM_CELDA;
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(p, 0);
            escenarioCtx.lineTo(p, 450);
            escenarioCtx.stroke();
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(0, p);
            escenarioCtx.lineTo(450, p);
            escenarioCtx.stroke();
        }

        // Dibujar personaje (círculo rojo)
        const centroX = posX * TAM_CELDA + TAM_CELDA/2;
        const centroY = posY * TAM_CELDA + TAM_CELDA/2;
        escenarioCtx.beginPath();
        escenarioCtx.arc(centroX, centroY, TAM_CELDA*0.3, 0, 2*Math.PI);
        escenarioCtx.fillStyle = '#d64550';
        escenarioCtx.shadowColor = '#4a1f1f';
        escenarioCtx.shadowBlur = 10;
        escenarioCtx.fill();
        escenarioCtx.shadowBlur = 0;
        escenarioCtx.strokeStyle = '#ffdd99';
        escenarioCtx.lineWidth = 4;
        escenarioCtx.stroke();

        // Dibujar ojos
        escenarioCtx.fillStyle = 'white';
        escenarioCtx.beginPath();
        escenarioCtx.arc(centroX-12, centroY-10, 6, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.beginPath();
        escenarioCtx.arc(centroX+12, centroY-10, 6, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.fillStyle = '#0d1f2c';
        escenarioCtx.beginPath();
        escenarioCtx.arc(centroX-14, centroY-12, 3, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.beginPath();
        escenarioCtx.arc(centroX+10, centroY-12, 3, 0, 2*Math.PI);
        escenarioCtx.fill();
    }

    // --- ANIMACIÓN DEL ESCENARIO ---
    function iniciarAnimacion(movimientos) {
        if (animacionActiva) {
            cancelAnimationFrame(frameId);
        }
        secuenciaMovimientos = movimientos;
        pasoActual = 0;
        posX = 2; posY = 2;   // reiniciar posición central

        function paso() {
            if (pasoActual < secuenciaMovimientos.length) {
                const dir = secuenciaMovimientos[pasoActual];
                // Actualizar coordenadas (límites 0-4)
                if (dir === 'arriba' && posY > 0) posY--;
                else if (dir === 'abajo' && posY < 4) posY++;
                else if (dir === 'izquierda' && posX > 0) posX--;
                else if (dir === 'derecha' && posX < 4) posX++;
                // Si choca con borde, simplemente no se mueve (se podría indicar)

                pasoActual++;
                dibujarEscenario();
                frameId = requestAnimationFrame(paso);
            } else {
                // Fin de la animación
                animacionActiva = false;
                frameId = null;
            }
        }

        animacionActiva = true;
        dibujarEscenario(); // dibujo inicial
        frameId = requestAnimationFrame(paso);
    }

    // --- EJECUTAR (nueva versión con escenario) ---
    function ejecutar() {
        const { exito, mensaje, movimientos } = obtenerSecuenciaMovimientos();

        // Mostrar log también
        let logLines = [];
        if (!exito) {
            logLines.push(`❌ Error: ${mensaje}`);
        } else {
            logLines.push(`✅ Secuencia obtenida (${movimientos.length} movimientos): ${movimientos.join(' → ')}`);
        }
        logContent.innerHTML = logLines.map(l => `<div>${l}</div>`).join('');

        // Abrir el escenario y animar (incluso si hay error, mostramos el escenario sin movimientos)
        modal.classList.remove('hidden');
        iniciarAnimacion(movimientos);  // si no hay movimientos, solo dibuja posición inicial
    }

    // --- REINICIAR (limpia consola) ---
    function reiniciar() {
        logContent.innerHTML = '-- Consola reiniciada --';
    }

    // --- CERRAR ESCENARIO ---
    function cerrarEscenario() {
        modal.classList.add('hidden');
        if (animacionActiva) {
            cancelAnimationFrame(frameId);
            animacionActiva = false;
        }
    }

    // --- Inicialización ---
    function init() {
        resizeCanvas();

        document.getElementById('btnAddInicio').addEventListener('click', () => addNode('inicio'));
        document.getElementById('btnAddMover').addEventListener('click', () => addNode('move'));
        document.getElementById('btnAddFin').addEventListener('click', () => addNode('fin'));
        document.getElementById('btnEjecutar').addEventListener('click', ejecutar);
        document.getElementById('btnReiniciar').addEventListener('click', reiniciar);
        btnCerrar.addEventListener('click', cerrarEscenario);

        workspace.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        workspace.addEventListener('dragstart', (e) => e.preventDefault());

        // Nodos de ejemplo
        addNode('inicio');
        addNode('move');
        addNode('fin');

        setTimeout(() => {
            const inicioNode = nodes.find(n => n.type === 'inicio');
            const moveNode = nodes.find(n => n.type === 'move');
            const finNode = nodes.find(n => n.type === 'fin');
            if (inicioNode && moveNode) addConnection(inicioNode.id, moveNode.id);
            if (moveNode && finNode) addConnection(moveNode.id, finNode.id);
        }, 100);
    }

    init();
})();
</script>
</body>
</html>
