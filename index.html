<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor visual masivo · 5000 nodos + búsqueda</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1e2a36;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app-container {
            background: #14222e;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
            width: 1300px;
            max-width: 100%;
        }
        .toolbar {
            background: #1f3342;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 6px #0a1a26, 0 6px 12px black;
        }
        .toolbar button, .toolbar input {
            background: #31658c;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1b3f57;
            transition: 0.07s;
            border-bottom: 2px solid #0f2c3a;
        }
        .toolbar button:hover {
            background: #3f7aab;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #1b3f57;
        }
        .toolbar button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1b3f57;
        }
        .toolbar input {
            background: #2b4d66;
            box-shadow: inset 0 2px 5px #0e1f2b;
            border: 2px solid #5f8db0;
            cursor: text;
            width: 250px;
            color: #e0f0ff;
        }
        .toolbar input::placeholder {
            color: #9bbad0;
        }
        .workspace-wrapper {
            position: relative;
            background: #263e50;
            border-radius: 30px;
            padding: 10px;
            box-shadow: inset 0 0 0 2px #1d2e3c, 0 10px 20px rgba(0,0,0,0.6);
        }
        #workspace {
            position: relative;
            width: 100%;
            height: 600px;
            background: #cedbe8;
            background-image: 
                linear-gradient(rgba(90, 110, 130, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(90, 110, 130, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 24px;
            overflow: hidden;
            cursor: default;
        }
        #canvas-nodes, #canvas-connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #canvas-nodes {
            pointer-events: none;  /* las interacciones se manejan por coordenadas en el workspace */
            z-index: 5;
        }
        #canvas-connections {
            pointer-events: none;
            z-index: 10;
        }
        /* overlay invisible para capturar eventos */
        #event-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            cursor: crosshair;
        }
        .log-panel {
            background: #10212b;
            margin-top: 20px;
            border-radius: 30px;
            padding: 12px 22px;
            color: #b3dcff;
            font-family: monospace;
            border: 2px solid #173545;
            max-height: 120px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px #07131c;
        }
        .log-panel div {
            padding: 4px 0;
            border-bottom: 1px solid #2f516b;
        }
        .log-title {
            font-weight: bold;
            color: #ffc857;
            border: none;
            font-size: 1.1rem;
        }
        .stats {
            color: #aad0f5;
            background: #0a1f2c;
            border-radius: 20px;
            padding: 4px 15px;
            margin-left: auto;
            font-weight: bold;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1e3b4f;
            border-radius: 60px;
            padding: 30px;
            border: 5px solid #4f8bbf;
            box-shadow: 0 20px 30px black;
        }
        .modal-content h2 {
            color: white;
            margin-top: 0;
        }
        #escenario-canvas {
            background: #aac7df;
            border-radius: 40px;
            box-shadow: inset 0 0 0 5px #2a5777;
            width: 450px;
            height: 450px;
        }
        .modal-botones button {
            background: #d65f5f;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 10px 40px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 6px 0 #6b2525;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <button id="btnAddInicio">➕ Inicio</button>
        <button id="btnAddMover">🔄 Mover</button>
        <button id="btnAddFin">🏁 Fin</button>
        <button id="btnAdd5000">⚡ Añadir 5000 nodos</button>
        <input type="text" id="searchInput" placeholder="🔍 Buscar (id, tipo, dirección...)" />
        <button id="btnEjecutar">▶️ Ejecutar</button>
        <button id="btnReiniciar">♻️ Reiniciar</button>
        <span class="stats" id="nodeCount">Nodos: 0</span>
    </div>

    <div class="workspace-wrapper">
        <div id="workspace">
            <canvas id="canvas-nodes" width="1200" height="600"></canvas>
            <canvas id="canvas-connections" width="1200" height="600"></canvas>
            <div id="event-overlay"></div>
        </div>
    </div>

    <div class="log-panel" id="logPanel">
        <div class="log-title">📋 Consola</div>
        <div id="logContent">-- Editor masivo listo --</div>
    </div>
</div>

<!-- Modal escenario (igual que antes) -->
<div id="modalEscenario" class="modal-overlay hidden">
    <div class="modal-content">
        <h2>🎮 ESCENARIO</h2>
        <canvas id="escenario-canvas" width="450" height="450"></canvas>
        <div class="modal-botones">
            <button id="btnCerrarEscenario">🚪 SALIR</button>
        </div>
    </div>
</div>

<script>
(function() {
    // --- Estado ---
    let nodes = [];
    let connections = [];         // { fromId, toId }
    let nextId = 1;
    let searchTerm = '';

    // Referencias a canvas
    const workspace = document.getElementById('workspace');
    const canvasNodes = document.getElementById('canvas-nodes');
    const canvasConn = document.getElementById('canvas-connections');
    const ctxNodes = canvasNodes.getContext('2d');
    const ctxConn = canvasConn.getContext('2d');
    const overlay = document.getElementById('event-overlay');
    const logContent = document.getElementById('logContent');
    const nodeCountSpan = document.getElementById('nodeCount');

    // Variables de interacción
    let draggingNode = null;            // id del nodo arrastrado
    let dragOffsetX = 0, dragOffsetY = 0;
    let draggingConnection = false;
    let fromNodeId = null;
    let tempEndPos = { x: 0, y: 0 };
    let isDragging = false;              // para distinguir click de arrastre

    // Escenario
    const modal = document.getElementById('modalEscenario');
    const escenarioCanvas = document.getElementById('escenario-canvas');
    const escenarioCtx = escenarioCanvas.getContext('2d');
    const btnCerrar = document.getElementById('btnCerrarEscenario');
    let animacionActiva = false;
    let frameId = null;
    let secuenciaMovimientos = [];
    let pasoActual = 0;
    let posX = 2, posY = 2;
    const TAM_CELDA = 90;

    // --- Funciones de dibujo (nodos y conexiones) ---
    function resizeCanvases() {
        const rect = workspace.getBoundingClientRect();
        canvasNodes.width = rect.width;
        canvasNodes.height = rect.height;
        canvasConn.width = rect.width;
        canvasConn.height = rect.height;
        drawAll();
    }
    window.addEventListener('resize', resizeCanvases);

    function drawAll() {
        drawNodes();
        drawConnections();
    }

    function drawNodes() {
        ctxNodes.clearRect(0, 0, canvasNodes.width, canvasNodes.height);
        const rect = canvasNodes.getBoundingClientRect();
        const scaleX = canvasNodes.width / rect.width;   // normalmente 1 si coincide
        const scaleY = canvasNodes.height / rect.height;

        // Ordenar para que los nodos seleccionados (por búsqueda) se dibujen encima
        const sorted = [...nodes].sort((a,b) => {
            const aMatch = matchesSearch(a) ? 1 : 0;
            const bMatch = matchesSearch(b) ? 1 : 0;
            return aMatch - bMatch; // los que matchean van al final (encima)
        });

        for (let node of sorted) {
            const x = node.x;
            const y = node.y;
            const w = 160;
            const h = 90;

            // Sombra
            ctxNodes.shadowColor = '#00000060';
            ctxNodes.shadowBlur = 10;
            ctxNodes.shadowOffsetY = 4;
            // Fondo del nodo
            ctxNodes.fillStyle = '#f4f9ff';
            ctxNodes.beginPath();
            ctxNodes.roundRect(x, y, w, h, 16);
            ctxNodes.fill();
            // Borde (resaltar si coincide búsqueda)
            ctxNodes.shadowBlur = 0;
            ctxNodes.lineWidth = matchesSearch(node) ? 6 : 3;
            ctxNodes.strokeStyle = matchesSearch(node) ? '#f5c542' : '#1f3a4b';
            ctxNodes.stroke();

            // Cabecera
            ctxNodes.fillStyle = '#2b4b65';
            ctxNodes.beginPath();
            ctxNodes.roundRect(x, y, w, 30, 12, 12, 0, 0); // esquinas superiores
            ctxNodes.fill();

            // Texto cabecera
            ctxNodes.font = 'bold 14px "Segoe UI"';
            ctxNodes.fillStyle = 'white';
            ctxNodes.textAlign = 'left';
            let headerText = node.type === 'inicio' ? '🚀 INICIO' : (node.type === 'fin' ? '🏁 FIN' : '⚙️ MOVER');
            ctxNodes.fillText(headerText, x + 12, y + 20);

            // Badge tipo
            ctxNodes.font = 'bold 10px monospace';
            ctxNodes.fillStyle = '#173342';
            ctxNodes.textAlign = 'right';
            ctxNodes.fillText(node.type.toUpperCase(), x + w - 12, y + 20);

            // Contenido
            ctxNodes.font = '12px "Segoe UI"';
            ctxNodes.fillStyle = '#0a1e2b';
            if (node.type === 'move') {
                ctxNodes.fillStyle = '#1f3e52';
                ctxNodes.fillText(`Dirección: ${node.direction || 'derecha'}`, x + 15, y + 55);
            } else {
                ctxNodes.fillStyle = '#346792';
                ctxNodes.fillText(node.type === 'inicio' ? 'Entrada' : 'Final', x + 40, y + 55);
            }

            // Puerto izquierdo (entrada)
            if (node.type !== 'inicio') {
                ctxNodes.fillStyle = '#4db8b8';
                ctxNodes.beginPath();
                ctxNodes.arc(x - 6, y + 45, 10, 0, 2*Math.PI);
                ctxNodes.fill();
                ctxNodes.strokeStyle = '#1d6b6b';
                ctxNodes.lineWidth = 3;
                ctxNodes.stroke();
            }
            // Puerto derecho (salida)
            if (node.type !== 'fin') {
                ctxNodes.fillStyle = '#f0a55a';
                ctxNodes.beginPath();
                ctxNodes.arc(x + w + 6, y + 45, 10, 0, 2*Math.PI);
                ctxNodes.fill();
                ctxNodes.strokeStyle = '#a5521a';
                ctxNodes.lineWidth = 3;
                ctxNodes.stroke();
            }

            // Pequeño ID para depuración/búsqueda
            ctxNodes.font = '9px monospace';
            ctxNodes.fillStyle = '#3d5e7a';
            ctxNodes.fillText(`#${node.id}`, x + 120, y + 78);
        }
        ctxNodes.shadowBlur = 0;
        nodeCountSpan.textContent = `Nodos: ${nodes.length}`;
    }

    // helper para roundRect
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r, tl, tr, bl, br) {
        if (typeof r === 'number') {
            tl = tr = bl = br = r;
        }
        this.beginPath();
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + tr);
        this.lineTo(x + w, y + h - br);
        this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
        this.lineTo(x + bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - bl);
        this.lineTo(x, y + tl);
        this.quadraticCurveTo(x, y, x + tl, y);
        this.closePath();
        return this;
    };

    function drawConnections() {
        ctxConn.clearRect(0, 0, canvasConn.width, canvasConn.height);
        connections.forEach(conn => {
            const fromPos = getPortPos(conn.fromId, 'output');
            const toPos = getPortPos(conn.toId, 'input');
            if (fromPos && toPos) {
                drawLine(ctxConn, fromPos, toPos, '#1f6390', 4);
            }
        });
        if (draggingConnection && fromNodeId) {
            const startPos = getPortPos(fromNodeId, 'output');
            if (startPos) {
                drawLine(ctxConn, startPos, tempEndPos, '#f0a55a', 3, true);
            }
        }
    }

    function drawLine(ctx, from, to, color, width, dashed = false) {
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.setLineDash(dashed ? [8, 6] : []);
        ctx.stroke();
        if (!dashed) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            const arrowSize = 10;
            ctx.beginPath();
            ctx.moveTo(to.x, to.y);
            ctx.lineTo(to.x - arrowSize * Math.cos(angle - 0.3), to.y - arrowSize * Math.sin(angle - 0.3));
            ctx.lineTo(to.x - arrowSize * Math.cos(angle + 0.3), to.y - arrowSize * Math.sin(angle + 0.3));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }
        ctx.setLineDash([]);
    }

    function getPortPos(nodeId, portType) {
        const node = nodes.find(n => n.id == nodeId);
        if (!node) return null;
        const x = node.x;
        const y = node.y;
        const w = 160;
        const offsetX = portType === 'input' ? -6 : w + 6;
        return {
            x: x + offsetX,
            y: y + 45
        };
    }

    // --- Interacción: detección de elementos bajo el mouse ---
    function handleMouseDown(e) {
        const rect = workspace.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // Detectar puertos de salida primero
        const outputPortNode = findNodeWithOutputAt(mouseX, mouseY);
        if (outputPortNode) {
            e.preventDefault();
            fromNodeId = outputPortNode.id;
            draggingConnection = true;
            tempEndPos.x = mouseX;
            tempEndPos.y = mouseY;
            drawAll();
            return;
        }

        // Detectar cabecera de nodo (para arrastrar)
        const headerNode = findNodeHeaderAt(mouseX, mouseY);
        if (headerNode) {
            e.preventDefault();
            draggingNode = headerNode.id;
            dragOffsetX = mouseX - headerNode.x;
            dragOffsetY = mouseY - headerNode.y;
            isDragging = false; // se convertirá en true si hay movimiento
            return;
        }
    }

    function handleMouseMove(e) {
        const rect = workspace.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (draggingConnection) {
            tempEndPos.x = mouseX;
            tempEndPos.y = mouseY;
            drawAll();
        }

        if (draggingNode) {
            isDragging = true;
            const node = nodes.find(n => n.id == draggingNode);
            if (node) {
                let newX = mouseX - dragOffsetX;
                let newY = mouseY - dragOffsetY;
                // límites
                newX = Math.max(0, Math.min(canvasNodes.width - 160, newX));
                newY = Math.max(0, Math.min(canvasNodes.height - 90, newY));
                node.x = newX;
                node.y = newY;
                drawAll();
            }
        }
    }

    function handleMouseUp(e) {
        const rect = workspace.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (draggingConnection) {
            const inputPortNode = findNodeWithInputAt(mouseX, mouseY);
            if (inputPortNode && fromNodeId) {
                addConnection(fromNodeId, inputPortNode.id);
            }
            draggingConnection = false;
            fromNodeId = null;
            drawAll();
        }

        if (draggingNode) {
            if (!isDragging) {
                // Fue un clic sin arrastre: podríamos seleccionar, pero no necesario
            }
            draggingNode = null;
            isDragging = false;
        }
    }

    // Funciones de detección de área
    function findNodeWithOutputAt(mx, my) {
        // busca nodo que tenga puerto derecho (output) y que no sea fin
        for (let node of nodes) {
            if (node.type === 'fin') continue;
            const x = node.x + 166;  // posición del puerto derecho
            const y = node.y + 45;
            const dist = Math.hypot(mx - x, my - y);
            if (dist < 15) return node;
        }
        return null;
    }

    function findNodeWithInputAt(mx, my) {
        for (let node of nodes) {
            if (node.type === 'inicio') continue;
            const x = node.x - 6;
            const y = node.y + 45;
            const dist = Math.hypot(mx - x, my - y);
            if (dist < 15) return node;
        }
        return null;
    }

    function findNodeHeaderAt(mx, my) {
        for (let node of nodes) {
            if (mx >= node.x && mx <= node.x + 160 && my >= node.y && my <= node.y + 30) {
                return node;
            }
        }
        return null;
    }

    // --- Conexiones ---
    function addConnection(fromId, toId) {
        if (fromId === toId) return;
        const fromNode = nodes.find(n => n.id == fromId);
        const toNode = nodes.find(n => n.id == toId);
        if (!fromNode || !toNode) return;
        if (fromNode.type === 'fin' || toNode.type === 'inicio') return;

        // eliminar conexiones previas
        connections = connections.filter(c => c.fromId !== fromId && c.toId !== toId);
        connections.push({ fromId, toId });
        drawAll();
    }

    // --- Búsqueda ---
    function matchesSearch(node) {
        if (!searchTerm) return false;
        const term = searchTerm.toLowerCase();
        return node.id.toString().includes(term) ||
               node.type.toLowerCase().includes(term) ||
               (node.direction && node.direction.toLowerCase().includes(term));
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        drawAll();
    });

    // --- Añadir nodos ---
    function addNode(type) {
        const newNode = {
            id: nextId++,
            type: type,
            x: 50 + Math.random() * 800,
            y: 50 + Math.random() * 400,
        };
        if (type === 'move') newNode.direction = ['arriba','abajo','izquierda','derecha'][Math.floor(Math.random()*4)];
        nodes.push(newNode);
        drawAll();
    }

    function add5000Nodes() {
        for (let i = 0; i < 5000; i++) {
            const type = ['inicio','move','fin'][Math.floor(Math.random()*3)];
            const newNode = {
                id: nextId++,
                type: type,
                x: 20 + Math.random() * (canvasNodes.width - 180),
                y: 20 + Math.random() * (canvasNodes.height - 110),
            };
            if (type === 'move') newNode.direction = ['arriba','abajo','izquierda','derecha'][Math.floor(Math.random()*4)];
            nodes.push(newNode);
        }
        drawAll();
        logContent.innerHTML = `<div>✅ 5000 nodos añadidos (total: ${nodes.length})</div>`;
    }

    // --- Ejecutar / Escenario ---
    function obtenerSecuenciaMovimientos() {
        const inicio = nodes.find(n => n.type === 'inicio');
        if (!inicio) return { exito: false, mensaje: 'No hay Inicio', movimientos: [] };

        let visitados = new Set();
        let current = inicio;
        let movimientos = [];
        let steps = 0;
        while (current && steps < 200) {
            if (visitados.has(current.id)) return { exito: false, mensaje: 'Ciclo', movimientos };
            visitados.add(current.id);
            if (current.type === 'move') movimientos.push(current.direction || 'derecha');
            if (current.type === 'fin') return { exito: true, mensaje: 'OK', movimientos };

            const outConn = connections.find(c => c.fromId === current.id);
            if (!outConn) return { exito: current.type === 'fin', mensaje: 'Sin salida', movimientos };
            const next = nodes.find(n => n.id == outConn.toId);
            if (!next) return { exito: false, mensaje: 'Conexión rota', movimientos };
            current = next;
            steps++;
        }
        return { exito: false, mensaje: 'Límite', movimientos };
    }

    function ejecutar() {
        const { exito, mensaje, movimientos } = obtenerSecuenciaMovimientos();
        logContent.innerHTML = `<div>${exito ? '✅' : '❌'} ${mensaje} (${movimientos.length} movs)</div>`;
        modal.classList.remove('hidden');
        iniciarAnimacion(movimientos);
    }

    function iniciarAnimacion(movimientos) {
        if (animacionActiva) cancelAnimationFrame(frameId);
        secuenciaMovimientos = movimientos;
        pasoActual = 0;
        posX = 2; posY = 2;

        function paso() {
            if (pasoActual < secuenciaMovimientos.length) {
                const dir = secuenciaMovimientos[pasoActual];
                if (dir === 'arriba' && posY > 0) posY--;
                else if (dir === 'abajo' && posY < 4) posY++;
                else if (dir === 'izquierda' && posX > 0) posX--;
                else if (dir === 'derecha' && posX < 4) posX++;
                pasoActual++;
                dibujarEscenario();
                frameId = requestAnimationFrame(paso);
            } else {
                animacionActiva = false;
                frameId = null;
            }
        }
        animacionActiva = true;
        dibujarEscenario();
        frameId = requestAnimationFrame(paso);
    }

    function dibujarEscenario() {
        escenarioCtx.clearRect(0, 0, 450, 450);
        escenarioCtx.strokeStyle = '#2b4b65';
        escenarioCtx.lineWidth = 3;
        for (let i = 0; i <= 5; i++) {
            const p = i * TAM_CELDA;
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(p, 0);
            escenarioCtx.lineTo(p, 450);
            escenarioCtx.stroke();
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(0, p);
            escenarioCtx.lineTo(450, p);
            escenarioCtx.stroke();
        }
        const cx = posX * TAM_CELDA + TAM_CELDA/2;
        const cy = posY * TAM_CELDA + TAM_CELDA/2;
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx, cy, 27, 0, 2*Math.PI);
        escenarioCtx.fillStyle = '#d64550';
        escenarioCtx.shadowColor = '#4a1f1f';
        escenarioCtx.shadowBlur = 12;
        escenarioCtx.fill();
        escenarioCtx.shadowBlur = 0;
        escenarioCtx.strokeStyle = '#ffdd99';
        escenarioCtx.lineWidth = 4;
        escenarioCtx.stroke();
    }

    function reiniciar() {
        logContent.innerHTML = '-- Consola reiniciada --';
    }

    function cerrarEscenario() {
        modal.classList.add('hidden');
        if (animacionActiva) cancelAnimationFrame(frameId);
        animacionActiva = false;
    }

    // --- Inicialización ---
    function init() {
        resizeCanvases();

        document.getElementById('btnAddInicio').addEventListener('click', () => addNode('inicio'));
        document.getElementById('btnAddMover').addEventListener('click', () => addNode('move'));
        document.getElementById('btnAddFin').addEventListener('click', () => addNode('fin'));
        document.getElementById('btnAdd5000').addEventListener('click', add5000Nodes);
        document.getElementById('btnEjecutar').addEventListener('click', ejecutar);
        document.getElementById('btnReiniciar').addEventListener('click', reiniciar);
        btnCerrar.addEventListener('click', cerrarEscenario);

        overlay.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);

        // Nodos de ejemplo
        addNode('inicio');
        addNode('move');
        addNode('fin');
        setTimeout(() => {
            const inicioNode = nodes.find(n => n.type === 'inicio');
            const moveNode = nodes.find(n => n.type === 'move');
            const finNode = nodes.find(n => n.type === 'fin');
            if (inicioNode && moveNode) addConnection(inicioNode.id, moveNode.id);
            if (moveNode && finNode) addConnection(moveNode.id, finNode.id);
        }, 200);
    }

    init();
})();
</script>
</body>
