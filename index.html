<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#4a7c44;">
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let socket = new WebSocket("ws://127.0.0.1:8080");
let me = { x: 100, y: 100, targetX: 100, targetY: 100, team: 'TR' };
let players = {};
const keys = {};

// Función LERP: Suaviza el movimiento (t es la velocidad de suavizado)
const lerp = (start, end, t) => start + (end - start) * t;

socket.onmessage = (e) => {
    if (e.data.startsWith("S:")) {
        const parts = e.data.substring(2).split(";");
        parts.forEach(p => {
            if (!p) return;
            const [id, data] = p.split("|");
            const [x, y, team] = data.split(",");
            
            if (!players[id]) players[id] = { x: +x, y: +y, targetX: +x, targetY: +y, team };
            else {
                // En lugar de saltar a la posición, actualizamos el destino
                players[id].targetX = +x;
                players[id].targetY = +y;
            }
        });
    }
};

function update() {
    if (keys['w']) me.y -= 4; if (keys['s']) me.y += 4;
    if (keys['a']) me.x -= 4; if (keys['d']) me.x += 4;

    // Enviamos nuestra posición al servidor
    if (socket.readyState === 1) {
        socket.send(`U:${Math.round(me.x)},${Math.round(me.y)},${me.team}`);
    }

    // Suavizamos el movimiento de los OTROS jugadores
    for (let id in players) {
        players[id].x = lerp(players[id].x, players[id].targetX, 0.2);
        players[id].y = lerp(players[id].y, players[id].targetY, 0.2);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar a otros (Interpolados)
    for (let id in players) {
        ctx.fillStyle = players[id].team === 'CT' ? '#3498db' : '#e67e22';
        ctx.beginPath();
        ctx.roundRect(players[id].x - 15, players[id].y - 20, 30, 35, 10);
        ctx.fill();
    }

    // Dibujarme a mí (Local - Respuesta inmediata)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.roundRect(me.x - 15, me.y - 20, 30, 35, 10);
    ctx.fill();

    update();
    requestAnimationFrame(draw);
}

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
draw();
</script>
</body>
</html>
