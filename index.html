<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor masivo · Create / SetVar + 5000 nodos</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1e2a36;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .app-container {
            background: #14222e;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
            width: 1300px;
            max-width: 100%;
        }
        .toolbar {
            background: #1f3342;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 6px #0a1a26, 0 6px 12px black;
            align-items: center;
        }
        .toolbar button, .toolbar input {
            background: #31658c;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1b3f57;
            transition: 0.07s;
            border-bottom: 2px solid #0f2c3a;
        }
        .toolbar button:hover {
            background: #3f7aab;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #1b3f57;
        }
        .toolbar button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1b3f57;
        }
        .toolbar input {
            background: #2b4d66;
            box-shadow: inset 0 2px 5px #0e1f2b;
            border: 2px solid #5f8db0;
            cursor: text;
            width: 220px;
            color: #e0f0ff;
        }
        .toolbar input::placeholder {
            color: #9bbad0;
        }
        .stats {
            color: #aad0f5;
            background: #0a1f2c;
            border-radius: 20px;
            padding: 4px 15px;
            margin-left: auto;
            font-weight: bold;
        }
        .workspace-wrapper {
            position: relative;
            background: #263e50;
            border-radius: 30px;
            padding: 10px;
            box-shadow: inset 0 0 0 2px #1d2e3c, 0 10px 20px rgba(0,0,0,0.6);
        }
        #workspace {
            position: relative;
            width: 100%;
            height: 600px;
            background: #cedbe8;
            background-image: 
                linear-gradient(rgba(90, 110, 130, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(90, 110, 130, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 24px;
            overflow: hidden;
            cursor: default;
        }
        #canvas-nodes, #canvas-connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #canvas-nodes { z-index: 5; }
        #canvas-connections { z-index: 10; }
        #event-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            cursor: crosshair;
        }
        .log-panel {
            background: #10212b;
            margin-top: 20px;
            border-radius: 30px;
            padding: 12px 22px;
            color: #b3dcff;
            font-family: monospace;
            border: 2px solid #173545;
            max-height: 120px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px #07131c;
        }
        .log-panel div {
            padding: 4px 0;
            border-bottom: 1px solid #2f516b;
        }
        .log-title {
            font-weight: bold;
            color: #ffc857;
            border: none;
            font-size: 1.1rem;
        }
        /* Modal escenario */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1e3b4f;
            border-radius: 60px;
            padding: 30px;
            border: 5px solid #4f8bbf;
            box-shadow: 0 20px 30px black;
            text-align: center;
        }
        .modal-content h2 {
            color: white;
            margin-top: 0;
        }
        #escenario-canvas {
            background: #aac7df;
            border-radius: 40px;
            box-shadow: inset 0 0 0 5px #2a5777;
            width: 450px;
            height: 450px;
        }
        .modal-botones button {
            background: #d65f5f;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 10px 40px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 6px 0 #6b2525;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <button id="btnAddInicio">🚀 Inicio</button>
        <button id="btnAddMover">🔄 Mover</button>
        <button id="btnAddFin">🏁 Fin</button>
        <button id="btnAddCreate">📦 Crear Objeto</button>
        <button id="btnAddSetVar">⚙️ Set Var</button>
        <button id="btnAdd500">➕ 500 aleatorios</button>
        <input type="text" id="searchInput" placeholder="🔍 Buscar (id, tipo, dirección, var...)" />
        <button id="btnEjecutar">▶️ Ejecutar</button>
        <button id="btnReiniciar">♻️ Reiniciar</button>
        <span class="stats" id="nodeCount">Nodos: 0</span>
    </div>

    <div class="workspace-wrapper">
        <div id="workspace">
            <canvas id="canvas-nodes" width="1200" height="600"></canvas>
            <canvas id="canvas-connections" width="1200" height="600"></canvas>
            <div id="event-overlay"></div>
        </div>
    </div>

    <div class="log-panel" id="logPanel">
        <div class="log-title">📋 Consola</div>
        <div id="logContent">-- Editor con Create/SetVar listo --</div>
    </div>
</div>

<!-- Modal escenario (mejorado para mostrar objetos y color variable) -->
<div id="modalEscenario" class="modal-overlay hidden">
    <div class="modal-content">
        <h2>🎮 ESCENARIO</h2>
        <canvas id="escenario-canvas" width="450" height="450"></canvas>
        <div class="modal-botones">
            <button id="btnCerrarEscenario">🚪 SALIR</button>
        </div>
    </div>
</div>

<script>
(function() {
    // --- Estado ampliado ---
    let nodes = [];
    let connections = [];         // { fromId, toId }
    let nextId = 1;
    let searchTerm = '';

    // Referencias canvas
    const workspace = document.getElementById('workspace');
    const canvasNodes = document.getElementById('canvas-nodes');
    const canvasConn = document.getElementById('canvas-connections');
    const ctxNodes = canvasNodes.getContext('2d');
    const ctxConn = canvasConn.getContext('2d');
    const overlay = document.getElementById('event-overlay');
    const logContent = document.getElementById('logContent');
    const nodeCountSpan = document.getElementById('nodeCount');

    // Variables interacción
    let draggingNode = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    let draggingConnection = false;
    let fromNodeId = null;
    let tempEndPos = { x: 0, y: 0 };
    let isDragging = false;

    // Escenario
    const modal = document.getElementById('modalEscenario');
    const escenarioCanvas = document.getElementById('escenario-canvas');
    const escenarioCtx = escenarioCanvas.getContext('2d');
    const btnCerrar = document.getElementById('btnCerrarEscenario');
    let animacionActiva = false;
    let frameId = null;
    let secuenciaMovimientos = [];
    let pasoActual = 0;
    let posX = 2, posY = 2;
    const TAM_CELDA = 90;

    // Estado global para el escenario (se construye en cada ejecución)
    let escenarioObjetos = [];     // { x, y, tipo }
    let colorPersonaje = '#d64550'; // rojo por defecto

    // --- Funciones de dibujo (nodos) ---
    function resizeCanvases() {
        const rect = workspace.getBoundingClientRect();
        canvasNodes.width = rect.width;
        canvasNodes.height = rect.height;
        canvasConn.width = rect.width;
        canvasConn.height = rect.height;
        drawAll();
    }
    window.addEventListener('resize', resizeCanvases);

    function drawAll() {
        drawNodes();
        drawConnections();
    }

    function matchesSearch(node) {
        if (!searchTerm) return false;
        const term = searchTerm.toLowerCase();
        if (node.id.toString().includes(term)) return true;
        if (node.type.toLowerCase().includes(term)) return true;
        if (node.type === 'move' && node.direction && node.direction.toLowerCase().includes(term)) return true;
        if (node.type === 'create' && node.objTipo && node.objTipo.toLowerCase().includes(term)) return true;
        if (node.type === 'setvar' && node.varName && node.varName.toLowerCase().includes(term)) return true;
        if (node.type === 'setvar' && node.varValue && node.varValue.toLowerCase().includes(term)) return true;
        return false;
    }

    function drawNodes() {
        ctxNodes.clearRect(0, 0, canvasNodes.width, canvasNodes.height);
        const sorted = [...nodes].sort((a,b) => (matchesSearch(a) ? 1 : 0) - (matchesSearch(b) ? 1 : 0));

        for (let node of sorted) {
            const x = node.x;
            const y = node.y;
            const w = 160;
            const h = 90;

            ctxNodes.shadowColor = '#00000060';
            ctxNodes.shadowBlur = 10;
            ctxNodes.shadowOffsetY = 4;
            ctxNodes.fillStyle = '#f4f9ff';
            ctxNodes.beginPath();
            ctxNodes.roundRect(x, y, w, h, 16);
            ctxNodes.fill();
            ctxNodes.shadowBlur = 0;
            ctxNodes.lineWidth = matchesSearch(node) ? 6 : 3;
            ctxNodes.strokeStyle = matchesSearch(node) ? '#f5c542' : '#1f3a4b';
            ctxNodes.stroke();

            // Cabecera según tipo
            ctxNodes.fillStyle = '#2b4b65';
            ctxNodes.beginPath();
            ctxNodes.roundRect(x, y, w, 30, 12, 12, 0, 0);
            ctxNodes.fill();

            ctxNodes.font = 'bold 14px "Segoe UI"';
            ctxNodes.fillStyle = 'white';
            ctxNodes.textAlign = 'left';
            let headerText = '';
            if (node.type === 'inicio') headerText = '🚀 INICIO';
            else if (node.type === 'fin') headerText = '🏁 FIN';
            else if (node.type === 'move') headerText = '🔄 MOVER';
            else if (node.type === 'create') headerText = '📦 CREATE';
            else if (node.type === 'setvar') headerText = '⚙️ SET VAR';
            ctxNodes.fillText(headerText, x + 12, y + 20);

            ctxNodes.font = 'bold 10px monospace';
            ctxNodes.fillStyle = '#173342';
            ctxNodes.textAlign = 'right';
            ctxNodes.fillText(node.type.toUpperCase(), x + w - 12, y + 20);

            // Contenido específico
            ctxNodes.font = '11px "Segoe UI"';
            ctxNodes.fillStyle = '#0a1e2b';
            if (node.type === 'move') {
                ctxNodes.fillStyle = '#1f3e52';
                ctxNodes.fillText(`Dir: ${node.direction || 'derecha'}`, x + 15, y + 55);
            } else if (node.type === 'create') {
                ctxNodes.fillStyle = '#2d6a4f';
                ctxNodes.fillText(`Obj: ${node.objTipo || 'círculo'}`, x + 15, y + 50);
                if (node.objX !== undefined && node.objY !== undefined) {
                    ctxNodes.fillText(`(${node.objX},${node.objY})`, x + 15, y + 70);
                }
            } else if (node.type === 'setvar') {
                ctxNodes.fillStyle = '#9c6b3d';
                ctxNodes.fillText(`${node.varName || 'var'} = ${node.varValue || '?'}`, x + 15, y + 55);
            } else {
                ctxNodes.fillStyle = '#346792';
                ctxNodes.fillText(node.type === 'inicio' ? 'Entrada' : 'Final', x + 40, y + 55);
            }

            // Puertos
            if (node.type !== 'inicio') {
                ctxNodes.fillStyle = '#4db8b8';
                ctxNodes.beginPath();
                ctxNodes.arc(x - 6, y + 45, 10, 0, 2*Math.PI);
                ctxNodes.fill();
                ctxNodes.strokeStyle = '#1d6b6b';
                ctxNodes.lineWidth = 3;
                ctxNodes.stroke();
            }
            if (node.type !== 'fin') {
                ctxNodes.fillStyle = '#f0a55a';
                ctxNodes.beginPath();
                ctxNodes.arc(x + w + 6, y + 45, 10, 0, 2*Math.PI);
                ctxNodes.fill();
                ctxNodes.strokeStyle = '#a5521a';
                ctxNodes.lineWidth = 3;
                ctxNodes.stroke();
            }

            ctxNodes.font = '9px monospace';
            ctxNodes.fillStyle = '#3d5e7a';
            ctxNodes.fillText(`#${node.id}`, x + 120, y + 78);
        }
        ctxNodes.shadowBlur = 0;
        nodeCountSpan.textContent = `Nodos: ${nodes.length}`;
    }

    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r, tl, tr, bl, br) {
        if (typeof r === 'number') tl = tr = bl = br = r;
        this.beginPath();
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + tr);
        this.lineTo(x + w, y + h - br);
        this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
        this.lineTo(x + bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - bl);
        this.lineTo(x, y + tl);
        this.quadraticCurveTo(x, y, x + tl, y);
        this.closePath();
        return this;
    };

    function drawConnections() {
        ctxConn.clearRect(0, 0, canvasConn.width, canvasConn.height);
        connections.forEach(conn => {
            const fromPos = getPortPos(conn.fromId, 'output');
            const toPos = getPortPos(conn.toId, 'input');
            if (fromPos && toPos) {
                drawLine(ctxConn, fromPos, toPos, '#1f6390', 4);
            }
        });
        if (draggingConnection && fromNodeId) {
            const startPos = getPortPos(fromNodeId, 'output');
            if (startPos) {
                drawLine(ctxConn, startPos, tempEndPos, '#f0a55a', 3, true);
            }
        }
    }

    function drawLine(ctx, from, to, color, width, dashed = false) {
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.setLineDash(dashed ? [8, 6] : []);
        ctx.stroke();
        if (!dashed) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            const arrowSize = 10;
            ctx.beginPath();
            ctx.moveTo(to.x, to.y);
            ctx.lineTo(to.x - arrowSize * Math.cos(angle - 0.3), to.y - arrowSize * Math.sin(angle - 0.3));
            ctx.lineTo(to.x - arrowSize * Math.cos(angle + 0.3), to.y - arrowSize * Math.sin(angle + 0.3));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }
        ctx.setLineDash([]);
    }

    function getPortPos(nodeId, portType) {
        const node = nodes.find(n => n.id == nodeId);
        if (!node) return null;
        const x = node.x;
        const y = node.y;
        const w = 160;
        const offsetX = portType === 'input' ? -6 : w + 6;
        return { x: x + offsetX, y: y + 45 };
    }

    // --- Interacción ---
    function findNodeWithOutputAt(mx, my) {
        for (let node of nodes) {
            if (node.type === 'fin') continue;
            const x = node.x + 166;
            const y = node.y + 45;
            if (Math.hypot(mx - x, my - y) < 15) return node;
        }
        return null;
    }

    function findNodeWithInputAt(mx, my) {
        for (let node of nodes) {
            if (node.type === 'inicio') continue;
            const x = node.x - 6;
            const y = node.y + 45;
            if (Math.hypot(mx - x, my - y) < 15) return node;
        }
        return null;
    }

    function findNodeHeaderAt(mx, my) {
        for (let node of nodes) {
            if (mx >= node.x && mx <= node.x + 160 && my >= node.y && my <= node.y + 30) {
                return node;
            }
        }
        return null;
    }

    function handleMouseDown(e) {
        const rect = workspace.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const outNode = findNodeWithOutputAt(mx, my);
        if (outNode) {
            e.preventDefault();
            fromNodeId = outNode.id;
            draggingConnection = true;
            tempEndPos.x = mx;
            tempEndPos.y = my;
            drawAll();
            return;
        }

        const headerNode = findNodeHeaderAt(mx, my);
        if (headerNode) {
            e.preventDefault();
            draggingNode = headerNode.id;
            dragOffsetX = mx - headerNode.x;
            dragOffsetY = my - headerNode.y;
            isDragging = false;
        }
    }

    function handleMouseMove(e) {
        const rect = workspace.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (draggingConnection) {
            tempEndPos.x = mx;
            tempEndPos.y = my;
            drawAll();
        }
        if (draggingNode) {
            isDragging = true;
            const node = nodes.find(n => n.id == draggingNode);
            if (node) {
                let newX = mx - dragOffsetX;
                let newY = my - dragOffsetY;
                newX = Math.max(0, Math.min(canvasNodes.width - 160, newX));
                newY = Math.max(0, Math.min(canvasNodes.height - 90, newY));
                node.x = newX;
                node.y = newY;
                drawAll();
            }
        }
    }

    function handleMouseUp(e) {
        const rect = workspace.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (draggingConnection) {
            const inNode = findNodeWithInputAt(mx, my);
            if (inNode && fromNodeId) {
                addConnection(fromNodeId, inNode.id);
            }
            draggingConnection = false;
            fromNodeId = null;
            drawAll();
        }
        if (draggingNode) {
            if (!isDragging) {
                // Doble clic? lo manejamos aparte con dblclick
            }
            draggingNode = null;
        }
    }

    // Doble clic para editar propiedades del nodo
    function handleDoubleClick(e) {
        const rect = workspace.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const node = findNodeHeaderAt(mx, my); // también podríamos permitir clic en cualquier parte
        if (!node) return;

        if (node.type === 'move') {
            const newDir = prompt('Nueva dirección (arriba, abajo, izquierda, derecha):', node.direction || 'derecha');
            if (newDir && ['arriba','abajo','izquierda','derecha'].includes(newDir)) {
                node.direction = newDir;
                drawAll();
            }
        } else if (node.type === 'create') {
            const input = prompt('Editar objeto: formato "tipo x y" (ej: círculo 2 3). Valores x,y de 0 a 4:', 
                `${node.objTipo || 'círculo'} ${node.objX ?? 2} ${node.objY ?? 2}`);
            if (input) {
                const parts = input.trim().split(/\s+/);
                if (parts.length >= 3) {
                    node.objTipo = parts[0];
                    node.objX = parseInt(parts[1]);
                    node.objY = parseInt(parts[2]);
                    if (isNaN(node.objX)) node.objX = 2;
                    if (isNaN(node.objY)) node.objY = 2;
                    node.objX = Math.min(4, Math.max(0, node.objX));
                    node.objY = Math.min(4, Math.max(0, node.objY));
                } else {
                    node.objTipo = input;
                    node.objX = 2; node.objY = 2;
                }
                drawAll();
            }
        } else if (node.type === 'setvar') {
            const input = prompt('Editar variable: formato "nombre=valor" (ej: color=verde):', 
                `${node.varName || 'color'}=${node.varValue || 'rojo'}`);
            if (input) {
                const eq = input.indexOf('=');
                if (eq > 0) {
                    node.varName = input.substring(0, eq).trim();
                    node.varValue = input.substring(eq+1).trim();
                } else {
                    node.varName = input;
                    node.varValue = '1';
                }
                drawAll();
            }
        } else {
            alert('Nodo de tipo ' + node.type + ' no editable');
        }
    }

    function addConnection(fromId, toId) {
        if (fromId === toId) return;
        const fromNode = nodes.find(n => n.id == fromId);
        const toNode = nodes.find(n => n.id == toId);
        if (!fromNode || !toNode) return;
        if (fromNode.type === 'fin' || toNode.type === 'inicio') return;
        connections = connections.filter(c => c.fromId !== fromId && c.toId !== toId);
        connections.push({ fromId, toId });
        drawAll();
    }

    // --- Añadir nodos ---
    function addNode(type, params = {}) {
        const newNode = {
            id: nextId++,
            type: type,
            x: 50 + Math.random() * 800,
            y: 50 + Math.random() * 400,
            ...params
        };
        if (type === 'move' && !newNode.direction) newNode.direction = 'derecha';
        if (type === 'create') {
            newNode.objTipo = newNode.objTipo || (Math.random() > 0.5 ? 'círculo' : 'cuadrado');
            newNode.objX = newNode.objX ?? Math.floor(Math.random()*5);
            newNode.objY = newNode.objY ?? Math.floor(Math.random()*5);
        }
        if (type === 'setvar') {
            newNode.varName = newNode.varName || 'color';
            newNode.varValue = newNode.varValue || ['rojo','verde','azul'][Math.floor(Math.random()*3)];
        }
        nodes.push(newNode);
        drawAll();
    }

    function addRandomNodes(count) {
        for (let i = 0; i < count; i++) {
            const r = Math.random();
            let type;
            if (r < 0.2) type = 'inicio';
            else if (r < 0.4) type = 'fin';
            else if (r < 0.6) type = 'move';
            else if (r < 0.8) type = 'create';
            else type = 'setvar';
            addNode(type);
        }
        drawAll();
    }

    // --- Ejecución: construir estado del escenario y secuencia de movimientos ---
    function obtenerSecuenciaYEstado() {
        const inicio = nodes.find(n => n.type === 'inicio');
        if (!inicio) return { exito: false, mensaje: 'No hay Inicio', movimientos: [], objetos: [], color: '#d64550' };

        let visitados = new Set();
        let current = inicio;
        let movimientos = [];
        let objetos = [];
        let color = '#d64550'; // rojo base
        let steps = 0;

        while (current && steps < 200) {
            if (visitados.has(current.id)) return { exito: false, mensaje: 'Ciclo', movimientos, objetos, color };
            visitados.add(current.id);

            if (current.type === 'move') {
                movimientos.push(current.direction || 'derecha');
            } else if (current.type === 'create') {
                // añadir objeto al escenario
                objetos.push({
                    x: current.objX ?? 2,
                    y: current.objY ?? 2,
                    tipo: current.objTipo || 'círculo'
                });
            } else if (current.type === 'setvar') {
                if (current.varName === 'color') {
                    const val = (current.varValue || 'rojo').toLowerCase();
                    if (val.includes('verde')) color = '#2ecc71';
                    else if (val.includes('azul')) color = '#3498db';
                    else if (val.includes('amarillo')) color = '#f1c40f';
                    else color = '#d64550'; // rojo por defecto
                }
                // se pueden añadir más variables
            }

            if (current.type === 'fin') break;

            const outConn = connections.find(c => c.fromId === current.id);
            if (!outConn) break;
            const next = nodes.find(n => n.id == outConn.toId);
            if (!next) break;
            current = next;
            steps++;
        }
        return { exito: true, mensaje: 'OK', movimientos, objetos, color };
    }

    function ejecutar() {
        const { exito, mensaje, movimientos, objetos, color } = obtenerSecuenciaYEstado();
        logContent.innerHTML = `<div>${exito ? '✅' : '❌'} ${mensaje} (${movimientos.length} movs, ${objetos.length} objetos)</div>`;

        // Guardar estado para el escenario
        escenarioObjetos = objetos;
        colorPersonaje = color;
        secuenciaMovimientos = movimientos;

        modal.classList.remove('hidden');
        iniciarAnimacion();
    }

    function iniciarAnimacion() {
        if (animacionActiva) cancelAnimationFrame(frameId);
        pasoActual = 0;
        posX = 2; posY = 2;  // inicio siempre centro

        function paso() {
            if (pasoActual < secuenciaMovimientos.length) {
                const dir = secuenciaMovimientos[pasoActual];
                if (dir === 'arriba' && posY > 0) posY--;
                else if (dir === 'abajo' && posY < 4) posY++;
                else if (dir === 'izquierda' && posX > 0) posX--;
                else if (dir === 'derecha' && posX < 4) posX++;
                pasoActual++;
                dibujarEscenario();
                frameId = requestAnimationFrame(paso);
            } else {
                animacionActiva = false;
                frameId = null;
            }
        }
        animacionActiva = true;
        dibujarEscenario();
        frameId = requestAnimationFrame(paso);
    }

    function dibujarEscenario() {
        escenarioCtx.clearRect(0, 0, 450, 450);
        // Grid
        escenarioCtx.strokeStyle = '#2b4b65';
        escenarioCtx.lineWidth = 3;
        for (let i = 0; i <= 5; i++) {
            const p = i * TAM_CELDA;
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(p, 0);
            escenarioCtx.lineTo(p, 450);
            escenarioCtx.stroke();
            escenarioCtx.beginPath();
            escenarioCtx.moveTo(0, p);
            escenarioCtx.lineTo(450, p);
            escenarioCtx.stroke();
        }

        // Dibujar objetos creados
        escenarioObjetos.forEach(obj => {
            const cx = obj.x * TAM_CELDA + TAM_CELDA/2;
            const cy = obj.y * TAM_CELDA + TAM_CELDA/2;
            if (obj.tipo === 'cuadrado') {
                escenarioCtx.fillStyle = '#5dade2';
                escenarioCtx.fillRect(cx-20, cy-20, 40, 40);
            } else {
                escenarioCtx.fillStyle = '#f7dc6f';
                escenarioCtx.beginPath();
                escenarioCtx.arc(cx, cy, 20, 0, 2*Math.PI);
                escenarioCtx.fill();
            }
            escenarioCtx.strokeStyle = '#000';
            escenarioCtx.lineWidth = 2;
            escenarioCtx.stroke();
        });

        // Personaje
        const cx = posX * TAM_CELDA + TAM_CELDA/2;
        const cy = posY * TAM_CELDA + TAM_CELDA/2;
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx, cy, 27, 0, 2*Math.PI);
        escenarioCtx.fillStyle = colorPersonaje;
        escenarioCtx.shadowColor = '#4a1f1f';
        escenarioCtx.shadowBlur = 12;
        escenarioCtx.fill();
        escenarioCtx.shadowBlur = 0;
        escenarioCtx.strokeStyle = '#ffdd99';
        escenarioCtx.lineWidth = 4;
        escenarioCtx.stroke();

        // Ojos
        escenarioCtx.fillStyle = 'white';
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx-12, cy-10, 6, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx+12, cy-10, 6, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.fillStyle = '#0d1f2c';
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx-14, cy-12, 3, 0, 2*Math.PI);
        escenarioCtx.fill();
        escenarioCtx.beginPath();
        escenarioCtx.arc(cx+10, cy-12, 3, 0, 2*Math.PI);
        escenarioCtx.fill();
    }

    function reiniciar() {
        logContent.innerHTML = '-- Consola reiniciada --';
    }

    function cerrarEscenario() {
        modal.classList.add('hidden');
        if (animacionActiva) cancelAnimationFrame(frameId);
        animacionActiva = false;
    }

    // --- Inicialización ---
    function init() {
        resizeCanvases();

        document.getElementById('btnAddInicio').addEventListener('click', () => addNode('inicio'));
        document.getElementById('btnAddMover').addEventListener('click', () => addNode('move'));
        document.getElementById('btnAddFin').addEventListener('click', () => addNode('fin'));
        document.getElementById('btnAddCreate').addEventListener('click', () => addNode('create'));
        document.getElementById('btnAddSetVar').addEventListener('click', () => addNode('setvar'));
        document.getElementById('btnAdd500').addEventListener('click', () => addRandomNodes(500));
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            drawAll();
        });
        document.getElementById('btnEjecutar').addEventListener('click', ejecutar);
        document.getElementById('btnReiniciar').addEventListener('click', reiniciar);
        btnCerrar.addEventListener('click', cerrarEscenario);

        overlay.addEventListener('mousedown', handleMouseDown);
        overlay.addEventListener('dblclick', handleDoubleClick);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);

        // Nodos de ejemplo
        addNode('inicio');
        addNode('move', { direction: 'derecha' });
        addNode('create', { objTipo: 'círculo', objX: 1, objY: 1 });
        addNode('setvar', { varName: 'color', varValue: 'verde' });
        addNode('fin');

        setTimeout(() => {
            const inicioNode = nodes.find(n => n.type === 'inicio');
            const moveNode = nodes.find(n => n.type === 'move');
            const finNode = nodes.find(n => n.type === 'fin');
            if (inicioNode && moveNode) addConnection(inicioNode.id, moveNode.id);
            if (moveNode && finNode) addConnection(moveNode.id, finNode.id);
        }, 200);
    }

    init();
})();
</script>
