<!DOCTYPE html>
<html>
<head>
    <title>Survivor CS 2D Pro</title>
    <style>
        body { margin: 0; background: #4a7c44; overflow: hidden; font-family: 'Arial Rounded', sans-serif; color: white; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
        #hud { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 2px solid #fff; }
        .btn { padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="menu" class="menu">
            <h1>SURVIVOR CS 2D</h1>
            <input type="text" id="ip" value="127.0.0.1" style="padding:10px; text-align:center;">
            <div>
                <button class="btn" style="background:#e67e22" onclick="join('TR')">TERRORISTA</button>
                <button class="btn" style="background:#3498db" onclick="join('CT')">CT</button>
            </div>
        </div>
        <div id="hud">
            HP: 100 | [Q] Pared de Piedra | [E] Plantar Bomba (TR)
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let socket, me = { x: 500, y: 500, ang: 0, team: 'TR', moving: false, firing: false };
let cam = { x: 500, y: 500 };
let players = {}, walls = [], keys = {};
const lerp = (a, b, t) => a + (b - a) * t;

function join(team) {
    const ip = document.getElementById('ip').value;
    me.team = team;
    socket = new WebSocket(`ws://${ip}:8080`);
    socket.onopen = () => { document.getElementById('menu').style.display = 'none'; loop(); };
    socket.onmessage = (e) => {
        if (e.data.startsWith("S:")) {
            e.data.substring(2).split(";").forEach(p => {
                if(!p) return;
                const [id, d] = p.split("|");
                const [x, y, ang, t, mov, fir] = d.split(",");
                if(!players[id]) players[id] = { x:+x, y:+y, tx:+x, ty:+y, team:t };
                else { players[id].tx = +x; players[id].ty = +y; players[id].ang = +ang; players[id].mov = mov==="true"; players[id].fir = fir==="true"; }
            });
        } else if (e.data.startsWith("W:")) {
            walls = e.data.substring(2).split(";").map(w => ({ x: +w.split(",")[0], y: +w.split(",")[1] }));
        }
    };
}

window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'q') socket.send(`B:${Math.round(me.x)},${Math.round(me.y)}`);
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
window.onmousemove = (e) => me.ang = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
window.onmousedown = () => me.firing = true;
window.onmouseup = () => me.firing = false;

function loop() {
    // 1. Lógica de Movimiento y Colisión
    let nx = me.x, ny = me.y;
    if (keys['w']) ny -= 4; if (keys['s']) ny += 4;
    if (keys['a']) nx -= 4; if (keys['d']) nx += 4;
    
    let collision = walls.some(w => Math.hypot(nx - w.x, ny - w.y) < 35);
    if (!collision) { me.x = nx; me.y = ny; }
    me.moving = (keys['w'] || keys['s'] || keys['a'] || keys['d']);

    // 2. Suavizado de Cámara (Lerp)
    cam.x = lerp(cam.x, me.x, 0.1);
    cam.y = lerp(cam.y, me.y, 0.1);

    // 3. Dibujado
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - cam.x, canvas.height/2 - cam.y);

    // Dibujar Suelo (Grid)
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<2000; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,2000); ctx.stroke(); }

    // Dibujar Paredes
    walls.forEach(w => {
        ctx.fillStyle = "#7f8c8d";
        ctx.beginPath(); ctx.roundRect(w.x-20, w.y-20, 40, 40, 8); ctx.fill();
        ctx.stroke();
    });

    // Dibujar Jugadores (Interpolados)
    Object.keys(players).forEach(id => {
        let p = players[id];
        p.x = lerp(p.x, p.tx, 0.2); p.y = lerp(p.y, p.ty, 0.2);
        drawSurvivor(p);
    });
    drawSurvivor(me);

    ctx.restore();

    if (socket.readyState === 1) socket.send(`U:${Math.round(me.x)},${Math.round(me.y)},${me.ang},${me.team},${me.moving},${me.firing}`);
    requestAnimationFrame(loop);
}

function drawSurvivor(p) {
    const bob = Math.sin(Date.now() * 0.01) * 3;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    // Cuerpo estilo bean Survivor.io
    ctx.fillStyle = p.team === 'CT' ? '#3498db' : '#e67e22';
    ctx.beginPath(); ctx.roundRect(-15, -20, 30, 35, 12); ctx.fill(); ctx.stroke();
    // Ojos
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(-6, -8, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -8, 4, 0, Math.PI*2); ctx.fill();
    // Arma y Manos
    ctx.rotate(p.ang);
    ctx.fillStyle = "#333"; ctx.fillRect(15, -4, 20, 8);
    ctx.fillStyle = "#f3c19d"; ctx.beginPath(); ctx.arc(15, 8, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
}
</script>
</body>
</html>
