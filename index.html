<!DOCTYPE html>
<html>
<head>
    <title>CS 2D: Global Offensive</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; filter: contrast(1.2); }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { padding: 20px 40px; margin: 10px; cursor: pointer; border: none; font-weight: bold; font-size: 20px; transition: 0.3s; }
        .tr { background: #de9b35; } .ct { background: #5d79ae; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #bombProgress { width: 200px; height: 10px; background: #333; margin: 10px auto; display: none; }
        #bombFill { height: 100%; width: 0%; background: red; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ELIGE TU BANDO</h1>
        <button class="btn tr" onclick="joinGame('TR')">TERRORISTAS</button>
        <button class="btn ct" onclick="joinGame('CT')">ANTI-TERRORISTAS</button>
    </div>

    <div id="hud">
        <h2 id="msg">ESPERANDO...</h2>
        <div id="bombProgress"><div id="bombFill"></div></div>
        <div id="stats">HP: 100 | Arma: AK-47</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let me = { x: 200, y: 200, angle: 0, team: null, hp: 100, isPlanting: false };
let players = {};
let bombPos = { x: 600, y: 400, r: 80 }; // Zona de bomba A
let bombState = "idle"; // idle, planting, planted
let plantTimer = 0;
const socket = new WebSocket('ws://localhost:8080');

// Para evitar el lag al disparar (Throttling)
let lastNetworkUpdate = 0;

function joinGame(team) {
    me.team = team;
    me.x = team === 'TR' ? 100 : canvas.width - 100;
    document.getElementById('menu').style.display = 'none';
}

window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; };
window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; me.isPlanting = false; };
const keys = {};

socket.onmessage = (e) => {
    if (e.data.startsWith("STATE:")) {
        const raw = e.data.substring(6).split(";");
        raw.forEach(p => {
            if (!p) return;
            const [id, data] = p.split("|");
            const [x, y, ang, team, fire] = data.split(",");
            players[id] = { x: +x, y: +y, angle: +ang, team, fire: fire === "true" };
        });
    } else if (e.data === "BOMB_EVENT:PLANTED") {
        bombState = "planted";
        document.getElementById('msg').innerText = "¡LA BOMBA HA SIDO PLANTADA!";
        document.getElementById('msg').style.color = "red";
    }
};

function checkBomb() {
    const dist = Math.hypot(me.x - bombPos.x, me.y - bombPos.y);
    if (me.team === 'TR' && dist < bombPos.r && keys['e'] && bombState === "idle") {
        me.isPlanting = true;
        plantTimer += 1.5;
        document.getElementById('bombProgress').style.display = 'block';
        document.getElementById('bombFill').style.width = plantTimer + "%";
        if (plantTimer >= 100) {
            socket.send("BOMB_PLANTED");
            bombState = "planted";
            me.isPlanting = false;
        }
    } else {
        me.isPlanting = false;
        plantTimer = 0;
        document.getElementById('bombProgress').style.display = 'none';
    }
}

function update() {
    if (!me.team) return;

    if (keys['w']) me.y -= 4; if (keys['s']) me.y += 4;
    if (keys['a']) me.x -= 4; if (keys['d']) me.x += 4;

    window.onmousemove = (e) => { me.angle = Math.atan2(e.clientY - me.y, e.clientX - me.x); };
    
    checkBomb();

    // Enviamos al servidor máximo cada 30ms para no saturar
    const now = Date.now();
    if (now - lastNetworkUpdate > 30 && socket.readyState === 1) {
        socket.send(`UPDATE:${me.x},${me.y},${me.angle},${me.team},${keys[' '] || false}`);
        lastNetworkUpdate = now;
    }
}

function draw() {
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Zona de Bomba
    ctx.strokeStyle = "rgba(255, 255, 0, 0.3)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(bombPos.x, bombPos.y, bombPos.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(255, 255, 0, 0.1)";
    ctx.fill();

    // Dibujar Jugadores
    Object.keys(players).forEach(id => {
        const p = players[id];
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.team === 'CT' ? '#5d79ae' : '#de9b35';
        ctx.fillRect(-15, -15, 30, 30);
        if (p.fire) { // Destello si dispara
            ctx.fillStyle = "yellow";
            ctx.fillRect(20, -2, 10, 4);
        }
        ctx.restore();
    });

    // Dibujar mi personaje
    if (me.team) {
        ctx.save();
        ctx.translate(me.x, me.y);
        ctx.rotate(me.angle);
        ctx.strokeStyle = "white";
        ctx.strokeRect(-16, -16, 32, 32);
        ctx.restore();
    }

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
