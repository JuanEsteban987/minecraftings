<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CS 2D Multiplayer - Java Backend</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: #333; }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #0f0; text-shadow: 2px 2px #000;
            pointer-events: none; font-size: 20px;
        }
        .weapon-info { font-size: 30px; color: #fff; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="hpDisplay">HEALTH: 100</div>
        <div class="weapon-info" id="weaponDisplay">AK-47 | 30/90</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURACIÓN DE ARMAS ---
const WEAPONS = [
    { name: "Glock", damage: 20, fireRate: 400, ammo: 20, maxAmmo: 100, recoil: 0.05, color: "#777" },
    { name: "AK-47", damage: 35, fireRate: 100, ammo: 30, maxAmmo: 90, recoil: 0.12, color: "#5d4037" },
    { name: "AWP", damage: 100, fireRate: 1500, ammo: 10, maxAmmo: 30, recoil: 0.5, color: "#2e7d32" }
];

// --- JUGADOR LOCAL ---
let me = {
    x: 100, y: 100, angle: 0, hp: 100,
    currentWeapon: 1, // AK-47 por defecto
    lastFired: 0,
    team: Math.random() > 0.5 ? 'CT' : 'TR'
};

let players = {};
const socket = new WebSocket('ws://localhost:8080');

// --- INPUTS ---
const keys = {};
let mousePos = { x: 0, y: 0 };
let isMouseDown = false;

window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') me.currentWeapon = 0;
    if (e.key === '2') me.currentWeapon = 1;
    if (e.key === '3') me.currentWeapon = 2;
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
window.onmousemove = (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; };
window.onmousedown = () => isMouseDown = true;
window.onmouseup = () => isMouseDown = false;

// --- LÓGICA DE RED ---
socket.onmessage = (event) => {
    const msg = event.data;
    if (msg.startsWith("STATE:")) {
        const data = msg.substring(6).split(";");
        data.forEach(p => {
            if (!p) return;
            const [id, stats] = p.split("|");
            const [x, y, angle, wIdx, firing, team] = stats.split(",");
            players[id] = { 
                x: parseFloat(x), y: parseFloat(y), 
                angle: parseFloat(angle), wIdx: parseInt(wIdx),
                isFiring: firing === "true", team: team
            };
        });
    }
};

function shoot() {
    const now = Date.now();
    const weapon = WEAPONS[me.currentWeapon];
    if (now - me.lastFired > weapon.fireRate && weapon.ammo > 0) {
        weapon.ammo--;
        me.lastFired = now;
        
        // Efecto visual local y envío al server
        socket.send(`HIT:${me.team}`); // Simplificado para este ejemplo
        console.log("PUM! con " + weapon.name);
    }
}

function update() {
    if (keys['w']) me.y -= 3;
    if (keys['s']) me.y += 3;
    if (keys['a']) me.x -= 3;
    if (keys['d']) me.x += 3;

    me.angle = Math.atan2(mousePos.y - me.y, mousePos.x - me.x);

    if (isMouseDown) shoot();

    // Actualizar HUD
    const w = WEAPONS[me.currentWeapon];
    document.getElementById('weaponDisplay').innerText = `${w.name} | ${w.ammo}/${w.maxAmmo}`;
    document.getElementById('hpDisplay').innerText = `HEALTH: ${me.hp}`;

    // Enviar al servidor
    if (socket.readyState === WebSocket.OPEN) {
        socket.send(`UPDATE:${me.x},${me.y},${me.angle},${me.currentWeapon},${isMouseDown},${me.team}`);
    }
}

function drawPlayer(p, isMe) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    // Cuerpo
    ctx.fillStyle = p.team === 'CT' ? '#2980b9' : '#c0392b';
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();
    if (isMe) { ctx.strokeStyle = "white"; ctx.stroke(); }

    // Arma
    const weaponColor = WEAPONS[isMe ? me.currentWeapon : p.wIdx].color;
    ctx.fillStyle = weaponColor;
    ctx.fillRect(15, -5, 25, 10);

    // Efecto de disparo
    if (p.isFiring || (isMe && isMouseDown)) {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(45, 0, 5, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Dibujar otros
    for (let id in players) {
        if (id !== socket.toString()) drawPlayer(players[id], false);
    }

    // Dibujar yo
    drawPlayer(me, true);

    update();
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
